name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (x.y.z)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump version
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version
          bun -e "
            const fs = require('fs');
            const v = '${{ inputs.version }}';
            for (const f of ['.claude-plugin/plugin.json']) {
              const c = JSON.parse(fs.readFileSync(f, 'utf8'));
              c.version = v;
              fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
            }
          "

      - name: Rebuild hooks so the committed artifact matches the bumped version
        run: bun run build

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json .claude-plugin/plugin.json hooks/
          git diff --staged --quiet || git commit -m "${{ inputs.version }}"
          git tag "${{ inputs.version }}"
          git push origin HEAD --tags

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "${{ inputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
